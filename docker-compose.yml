version: '3.8'

services:
  app:
    build: .
    container_name: whatsapp_bot_app
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./credentials.json:/app/scripts/credentials.json:ro
      - ./token.json:/app/scripts/token.json
    expose:
      - "8000"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: whatsapp_bot_tunnel
    restart: unless-stopped
    env_file:
      - .env
    # 🔴 Este token de Túnel lo recibes de Cloudflare
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TOKEN}
    depends_on:
      - app

  # --- CHATWOOT SERVICES ---
  base: &base
    image: chatwoot/chatwoot:latest
    env_file: .env
    volumes:
      - storage_data:/app/storage

  chatwoot_rails:
    <<: *base
    container_name: chatwoot_rails
    depends_on:
      - chatwoot_postgres
      - chatwoot_redis
    ports:
      - '127.0.0.1:3000:3000'
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
      - POSTGRES_HOST=chatwoot_postgres
      - REDIS_URL=redis://chatwoot_redis:6379
    entrypoint: docker/entrypoints/rails.sh
    command: ['bundle', 'exec', 'rails', 's', '-p', '3000', '-b', '0.0.0.0']
    restart: always

  chatwoot_sidekiq:
    <<: *base
    container_name: chatwoot_sidekiq
    depends_on:
      - chatwoot_postgres
      - chatwoot_redis
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
      - POSTGRES_HOST=chatwoot_postgres
      - REDIS_URL=redis://chatwoot_redis:6379
    command: ['bundle', 'exec', 'sidekiq', '-C', 'config/sidekiq.yml']
    restart: always

  chatwoot_postgres:
    image: pgvector/pgvector:pg16
    container_name: chatwoot_postgres
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=chatwoot
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=chatwoot_db_pass_1234

  chatwoot_redis:
    image: redis:alpine
    container_name: chatwoot_redis
    restart: always
    command: ["sh", "-c", "redis-server --requirepass \"$REDIS_PASSWORD\""]
    env_file: .env
    volumes:
      - redis_data:/data

  # --- BOT PERSISTENCE (ZEP + POSTGRES) ---
  bot_postgres:
    image: postgres:16
    container_name: bot_postgres
    restart: always
    environment:
      - POSTGRES_DB=bot_memory
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - bot_pg_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  zep_server:
    image: zepai/zep:latest
    container_name: zep_server
    restart: always
    depends_on:
      - bot_postgres
    environment:
      - ZEP_STORE_POSTGRES_DSN=postgres://postgres:postgres@bot_postgres:5432/bot_memory?sslmode=disable
      - ZEP_OPENAI_API_KEY=${OPENAI_API_KEY}
    ports:
      - "8001:8000"

  # --- CAL.COM (MOTOR DE AGENDA SELF-HOSTED) ---
  calcom_app:
    image: calcom/cal.com:v5.6.19-arm
    platform: linux/arm64
    container_name: calcom_app
    restart: always
    depends_on:
      - calcom_postgres
    expose:
      - "3000"
    environment:
      - DATABASE_URL=${CALCOM_DATABASE_URL}
      - DATABASE_DIRECT_URL=${CALCOM_DATABASE_URL}
      - NEXTAUTH_SECRET=${CALCOM_NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${CALCOM_URL}
      - NEXT_PUBLIC_WEBAPP_URL=${CALCOM_URL}
      - CALENDSO_ENCRYPTION_KEY=${CALCOM_ENCRYPTION_KEY}
      - NEXT_PUBLIC_LICENSE_CONSENT=agree
      - CALCOM_TELEMETRY_DISABLED=1
      - EMAIL_FROM=${ADMIN_EMAIL}
      - EMAIL_SERVER_HOST=smtp.gmail.com
      - EMAIL_SERVER_PORT=587
      - EMAIL_SERVER_USER=${SMTP_USER}
      - EMAIL_SERVER_PASSWORD=${SMTP_PASS}

  calcom_postgres:
    image: postgres:16
    container_name: calcom_postgres
    restart: always
    environment:
      - POSTGRES_DB=calcom
      - POSTGRES_USER=calcom_user
      - POSTGRES_PASSWORD=calcom_db_pass_5678
    volumes:
      - calcom_pg_data:/var/lib/postgresql/data

volumes:
  storage_data:
  postgres_data:
  redis_data:
  bot_pg_data:
  calcom_pg_data:
