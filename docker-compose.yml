version: '3.8'

services:
  app:
    build: .
    container_name: whatsapp_bot_app
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./credentials.json:/app/scripts/credentials.json:ro
      - ./token.json:/app/scripts/token.json
    expose:
      - "8000"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: whatsapp_bot_tunnel
    restart: unless-stopped
    env_file:
      - .env
    # 🔴 Este token de Túnel lo recibes de Cloudflare
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TOKEN}
    depends_on:
      - app

  # --- CHATWOOT SERVICES ---
  base: &base
    image: chatwoot/chatwoot:latest
    env_file: .env
    volumes:
      - storage_data:/app/storage

  chatwoot_rails:
    <<: *base
    container_name: chatwoot_rails
    depends_on:
      - chatwoot_postgres
      - chatwoot_redis
    ports:
      - '127.0.0.1:3000:3000'
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
      - POSTGRES_HOST=chatwoot_postgres
      - REDIS_URL=redis://chatwoot_redis:6379
    entrypoint: docker/entrypoints/rails.sh
    command: ['bundle', 'exec', 'rails', 's', '-p', '3000', '-b', '0.0.0.0']
    restart: always

  chatwoot_sidekiq:
    <<: *base
    container_name: chatwoot_sidekiq
    depends_on:
      - chatwoot_postgres
      - chatwoot_redis
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
      - POSTGRES_HOST=chatwoot_postgres
      - REDIS_URL=redis://chatwoot_redis:6379
    command: ['bundle', 'exec', 'sidekiq', '-C', 'config/sidekiq.yml']
    restart: always

  chatwoot_postgres:
    image: pgvector/pgvector:pg16
    container_name: chatwoot_postgres
    restart: always
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=chatwoot
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=chatwoot_db_pass_1234

  chatwoot_redis:
    image: redis:alpine
    container_name: chatwoot_redis
    restart: always
    command: ["sh", "-c", "redis-server --requirepass \"$REDIS_PASSWORD\""]
    env_file: .env
    volumes:
      - redis_data:/data
    ports:
      - '127.0.0.1:6379:6379'

volumes:
  storage_data:
  postgres_data:
  redis_data:
